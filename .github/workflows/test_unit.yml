name: Unit Tests

on:
    push:
        branches: [main]
    pull_request:
    workflow_call:

permissions:
    contents: read

jobs:
    unit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - name: Install BATS
              run: |
                  sudo apt-get update
                  sudo apt-get install -y bats
            - name: Run bash unit tests
              run: |
                  chmod +x tests/unit/test_has_changes.sh
                  ./tests/unit/test_has_changes.sh
                  bats tests/unit/test_latest_tag.bats
