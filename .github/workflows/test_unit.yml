name: Unit Tests

on:
    push:
        branches: [main]
    pull_request:

jobs:
    unit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Run bash unit tests
              run: |
                  chmod +x tests/unit/test_has_changes.sh
                  ./tests/unit/test_has_changes.sh
